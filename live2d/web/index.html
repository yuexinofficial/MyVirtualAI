<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        #live2d-canvas {
            display: block;
            width: 100%; height: 100%;
            outline: none;
        }
        canvas:focus, body:focus, *:focus { outline: none; }

        /* Window selected — blue border */
        body.window-focused {
            box-shadow: inset 0 0 0 2px rgba(100, 180, 255, 0.7);
        }

        /* Model selected — green border (canvas outline, model itself has PIXI indicator) */
        body.model-selected {
            box-shadow: inset 0 0 0 2px rgba(100, 255, 180, 0.5);
        }

        /* Toggle button — always visible */
        #chat-toggle {
            position: fixed; bottom: 8px; right: 8px;
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.45);
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 10;
            transition: background 0.2s;
            backdrop-filter: blur(4px);
        }
        #chat-toggle:hover { background: rgba(0,0,0,0.65); }

        /* Chat panel — hidden by default */
        #chat-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 8px 10px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255,255,255,0.12);
            display: flex; flex-direction: column; gap: 6px;
            z-index: 9;
            transform: translateY(100%);
            transition: transform 0.25s ease;
        }
        #chat-panel.visible { transform: translateY(0); }

        #chat-input {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            padding: 6px 10px;
            font-size: 13px;
            outline: none;
            min-width: 0;
        }
        #chat-input::placeholder { color: rgba(255,255,255,0.35); }
        #chat-input:focus { border-color: rgba(255,255,255,0.5); }

        #chat-send {
            background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 6px;
            color: #fff;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
        }
        #chat-send:hover { background: rgba(255,255,255,0.3); }

        #mode-toggle {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            padding: 6px 10px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
            line-height: 1;
        }
        #mode-toggle:hover { background: rgba(255,255,255,0.25); }
        #mode-toggle.text-mode { background: rgba(255,180,80,0.35); border-color: rgba(255,180,80,0.5); }

        #chat-history {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 6px;
            padding: 4px 2px;
            display: none;
            flex-direction: column;
            gap: 4px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }
        #chat-history.has-messages { display: flex; }

        .chat-bubble {
            max-width: 85%;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 12px;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
        }
        .chat-bubble.user {
            align-self: flex-end;
            background: rgba(100,150,255,0.35);
            color: #e0e8ff;
        }
        .chat-bubble.ai {
            align-self: flex-start;
            background: rgba(255,255,255,0.15);
            color: #f0f0f0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #status {
            position: fixed; bottom: 4px; left: 8px;
            color: rgba(255,255,255,0.25); font-size: 9px;
            pointer-events: none; z-index: 8;
            display: none;
        }

        /* Toast popup — floats AI response text near the model */
        #toast {
            position: fixed; top: 10%; left: 50%; transform: translateX(-50%);
            max-width: 88%;
            padding: 10px 18px;
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #f0f0f0;
            font-size: 14px;
            line-height: 1.5;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s ease;
            word-break: break-word;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>
    <canvas id="live2d-canvas"></canvas>

    <!-- Chat toggle button -->
    <button id="chat-toggle" title="文字聊天">💬</button>

    <!-- Chat input panel -->
    <div id="chat-panel">
        <div id="chat-history"></div>
        <div style="display:flex; gap:6px;">
            <input id="chat-input" type="text" placeholder="输入文字跟 AI 聊天..." maxlength="200" style="flex:1;">
            <button id="mode-toggle" title="切换语音/文字模式">🔊</button>
            <button id="chat-send">发送</button>
        </div>
    </div>

    <div id="status">loading...</div>
    <div id="toast"></div>

    <!-- Cubism Core SDK -->
    <script src="live2dcubismcore.min.js"></script>
    <!-- PIXI.js v7 -->
    <script src="pixi.min.js"></script>
    <!-- Polyfill: pixi-live2d-display expects Node.js process global -->
    <script>window.process = { env: {} };</script>
    <!-- pixi-live2d-display (cubism4 build) -->
    <script src="pixi-live2d-display.min.js"></script>
    <!-- QWebChannel -->
    <script src="qwebchannel.js"></script>
    <!-- App logic -->
    <script src="app.js"></script>
</body>
</html>
